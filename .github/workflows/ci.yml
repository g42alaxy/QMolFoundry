
name: CI
 
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
 
jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
 
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
 
      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          python-version: ${{ matrix.python-version }}
 
      - name: Install dependencies
        run: uv sync --frozen
 
      - name: Lint with ruff
        run: uv run ruff check app.py models utils scripts tests
 
      - name: Run tests
        run: uv run pytest -q
 
